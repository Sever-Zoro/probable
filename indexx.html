<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLine</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="togo">
    <header class="header">
        <div class="header__container header">
            <h1 class="header__title">TaskLite</h1>
            <nav class="Tabs header__tabs">
                <a href="#" class="tab active">To Do</a>
                <a href="#" class="tab">Kanban</a>
                <a href="#" class="tab">Привички</a>
            </nav>
        </div>
    </header>
    <main class="container todo__container">
        <h1 class="todo__title">Задачи</h1>
        <form class="form-add">
            <input type="text" class="form-add__input" placeholder="Введите задачу">
            <button class="form-add__batton" type="sumbit">Добавить</button>
        </form>
        <div class="toolbat">
            <input type="text" placeholder="Поиск задач" class="toojbat__search">
            <div class="toolbat__tabs tabs">
                <button class="tabs__btn">Всё</button>
                <button class="tabs__btn">Активные</button>
                <button class="tabs__btn">Завершенные</button>
            </div>
            <select class="toolbat__sort">
                <option value="1">Сначала старые</option>
                <option value="2">Сначала новые</option>
            </select>
        </div>
    </main>
</body>

</html>
