<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskLine</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body class="todo">
    <header class="header">
        <div class="header__container header">
            <h1 class="header__title">TaskLite</h1>
            <nav class="tabs header__tabs">
                <a href="#" class="header__link active">To Do</a>
                <a href="kanban.html" class="header__link">Kanban</a>
                <a href="#" class="header__link">Привички</a>
            </nav>
        </div>
    </header>
    <main class="container todo__container">
        <h1 class="todo__title">Задачи</h1>
        <form class="form-add">
            <input type="text" class="form-add__input" placeholder="Введите задачу">
            <button class="form-add__batton" type="sumbit">Добавить</button>
        </form>
        <div class="toolbat">
            <input type="text" placeholder="Поиск задач" class="toojbat__search">
            <div class="toolbat__tabs tabs">
                <button class="tabs__btn">Всё</button>
                <button class="tabs__btn">Активные</button>
                <button class="tabs__btn">Завершенные</button>
            </div>
            <select class="toolbat__sort">
                <option value="1">Сначала старые</option>
                <option value="2">Сначала новые</option>
            </select>
        </div>
        <div class="tasks">
            <div class="task">
                <div class="task__content">
                    <h3 class="task__title">Сделать уроки</h3>
                    <span class="task__meta">23.03.27, 12:30</span>
                </div>
            </div>
            <div class="task__actions">
                <button class="task__action task__action--edit">
                    <svg class="task__icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#6f64a3"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                </button>
                <button class="task__action task__action--delete">
                    <svg class="task__icon" viewBox="0 0 24 24" width="14 " height="14" fill="none" stroke="#cb6e6e"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                        <path d="M10 11v6" />
                        <path d="M14 11v6" />
                        <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
        </div>
        <div class="footer-controls">
            <div class="footer-controls__counters">
                <span>Всего: 1</span>
                <span>Активных: 1</span>
                <span>Выполненных: 0</span>
            </div>
            <button class="footer-controls__btn">Очистить выполненные</button>
        </div>
    </main>



    <script src="js/task.js"></script>
</body>

</html>
